services:
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: bd_smartcell
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - laravel-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: unless-stopped

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "8080:80"

    depends_on:
      - mysql

    networks:
      - laravel-network

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app
    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

    networks:
      - laravel-network

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel-network

volumes:
  mysql-data:

networks:
  laravel-network:
    driver: bridge